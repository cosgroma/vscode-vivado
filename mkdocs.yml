site_name: VS Code Vivado
site_description: Documentation and roadmap for Vivado project support in Visual Studio Code.
repo_url: https://github.com/cosgroma/vscode-vivado
edit_uri: edit/main/docs/
strict: true

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.action.edit
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Features: features.md
  - Vivado Roadmap: roadmap.md
  - Settings: settings.md
  - Development: development.md
  - Designs:
      - Vivado Run Commands: designs/vivado-run-commands.md
  - Testing: testing.md
  - Issue Dependency Plan: issue-dependency-plan.md
  - References:
      - VS Code Extensions: references-vscode.md
      - Vivado: references-vivado.md

plugins:
  - search
  # git-revision-date-localized uses Git history to determine page creation
  # and last-updated dates. In CI, ensure the repository is checked out with
  # full history (for example, actions/checkout with fetch-depth: 0), because
  # shallow clones can cause incorrect or identical dates across pages.
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
